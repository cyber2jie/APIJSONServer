spring.application.name=apijson_server
server.port=9000
# actuator
spring.jmx.enabled=true
management.endpoints.web.exposure.include=env,health,info,beans
management.endpoints.web.base-path=/management
management.endpoint.env.show-values=always
#apijson-server
apijsonServer.debug=false
apijsonServer.sqlDatabase=SQLITE
apijsonServer.need-verify=true
apijsonServer.driverClassName=org.sqlite.JDBC
apijsonServer.sqlSchema=main
apijsonServer.dbUrl=jdbc:sqlite:./test.db
apijsonServer.dbAccount=
apijsonServer.dbPassword=